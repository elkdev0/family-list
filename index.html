<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Bill Tracker | متتبع فواتير العائلة</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface2: #eef0f5;
      --surface3: #e3e6ee;
      --text: #16171a;
      --text2: #5f6673;
      --muted: #8a92a3;
      --border: #d9dde7;
      --accent: #6d5dfc;
      --red: #d93636;
      --red-bg: #ffe8e8;
      --yellow: #b7791f;
      --yellow-bg: #fff3d8;
      --green: #16834a;
      --green-bg: #ddf8ea;
      --shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    [data-theme="dark"] {
      --bg: #0f0f12;
      --surface: #18181d;
      --surface2: #23232b;
      --surface3: #2d2d36;
      --text: #f2f2f5;
      --text2: #b7b7c2;
      --muted: #777786;
      --border: #33333e;
      --shadow: 0 12px 28px rgba(0,0,0,0.35);
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    [dir="rtl"] body {
      font-family: Tahoma, Arial, sans-serif;
      text-align: right;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 1050px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button, select, input, textarea {
      font-family: inherit;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      background: var(--surface2);
      color: var(--text);
      transition: 0.15s;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .danger-btn {
      background: var(--red-bg);
      color: var(--red);
    }

    .paid-btn {
      background: var(--green-bg);
      color: var(--green);
    }

    .small-btn {
      padding: 7px 10px;
      font-size: 13px;
    }

    main {
      max-width: 1050px;
      margin: auto;
      padding: 20px 14px 60px;
    }

    .connection {
      margin-bottom: 14px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text2);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .summary-title {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 800;
    }

    .red { color: var(--red); }
    .yellow { color: var(--yellow); }
    .green { color: var(--green); }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .filters {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .filters button.active {
      background: var(--accent);
      color: white;
    }

    .bill-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 6px solid var(--surface3);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    [dir="rtl"] .bill {
      border-left: 1px solid var(--border);
      border-right: 6px solid var(--surface3);
    }

    .bill.past-due { border-left-color: var(--red); }
    .bill.due-soon { border-left-color: var(--yellow); }
    .bill.paid { border-left-color: var(--green); opacity: 0.72; }

    [dir="rtl"] .bill.past-due { border-right-color: var(--red); }
    [dir="rtl"] .bill.due-soon { border-right-color: var(--yellow); }
    [dir="rtl"] .bill.paid { border-right-color: var(--green); }

    .bill h3 { font-size: 18px; margin-bottom: 5px; }
    .meta { color: var(--text2); font-size: 14px; line-height: 1.7; }
    .notes { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .amount { font-size: 20px; font-weight: 900; text-align: right; }
    [dir="rtl"] .amount { text-align: left; }

    .badge {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-top: 4px;
    }

    .badge.past-due { background: var(--red-bg); color: var(--red); }
    .badge.due-soon { background: var(--yellow-bg); color: var(--yellow); }
    .badge.paid { background: var(--green-bg); color: var(--green); }
    .badge.not-due { background: var(--surface2); color: var(--text2); }

    .actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 35px;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 16px;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 50;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      color: var(--text);
      border-radius: 18px;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 650px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      color: var(--text2);
      font-size: 13px;
      font-weight: 800;
      display: block;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      border-radius: 10px;
      padding: 11px;
      outline: none;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .full { grid-column: 1 / -1; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .warning {
      color: var(--yellow);
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .bill { grid-template-columns: 1fr; }
      .amount { text-align: left; }
      [dir="rtl"] .amount { text-align: right; }
      .form-grid { grid-template-columns: 1fr; }
      .full { grid-column: 1; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <h1>💰 <span data-t="title">Family Bill Tracker</span></h1>
      <div class="controls">
        <button class="small-btn" id="themeBtn">🌙 <span data-t="dark">Dark</span></button>
        <button class="small-btn" id="langBtn">عربي</button>
        <button class="primary" id="addBtn">+ <span data-t="addBill">Add Bill</span></button>
      </div>
    </div>
  </header>

  <main>
    <div class="connection" id="connectionBox">Connecting to Firebase...</div>

    <section class="grid">
      <div class="card">
        <div class="summary-title" data-t="totalUnpaid">Total Unpaid</div>
        <div class="summary-value" id="totalUnpaid">$0.00</div>
      </div>
      <div class="card">
        <div class="summary-title" data-t="pastDue">Past Due</div>
        <div class="summary-value red" id="totalPastDue">$0.00</div>
      </div>
      <div class="card">
        <div class="summary-title" data-t="dueSoon">Due Soon</div>
        <div class="summary-value yellow" id="totalDueSoon">$0.00</div>
      </div>
      <div class="card">
        <div class="summary-title" data-t="paid">Paid</div>
        <div class="summary-value green" id="totalPaid">$0.00</div>
      </div>
    </section>

    <section class="toolbar">
      <div class="filters">
        <button class="filter active" data-filter="all" data-t="all">All</button>
        <button class="filter" data-filter="unpaid" data-t="unpaid">Unpaid</button>
        <button class="filter" data-filter="past-due" data-t="pastDue">Past Due</button>
        <button class="filter" data-filter="due-soon" data-t="dueSoon">Due Soon</button>
        <button class="filter" data-filter="paid" data-t="paid">Paid</button>
      </div>
    </section>

    <section id="billList" class="bill-list"></section>

    <p class="warning" data-t="privacy">
      Do not store bank numbers, card numbers, SSNs, or account numbers here. Use this only for bill name, amount, due date, and status.
    </p>
  </main>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle" data-t="addBill">Add Bill</h2>
        <button id="closeBtn">✕</button>
      </div>

      <form id="billForm">
        <div class="form-grid">
          <div>
            <label data-t="billName">Bill Name</label>
            <input id="name" required placeholder="Washington Gas" />
          </div>

          <div>
            <label data-t="provider">Provider / Company</label>
            <input id="provider" placeholder="NOVEC" />
          </div>

          <div>
            <label data-t="amount">Amount Due</label>
            <input id="amount" type="number" step="0.01" min="0" required placeholder="0.00" />
          </div>

          <div>
            <label data-t="dueDate">Due Date</label>
            <input id="dueDate" type="date" required />
          </div>

          <div>
            <label data-t="status">Status</label>
            <select id="status">
              <option value="not-due" data-t="notDue">Not Due Yet</option>
              <option value="due-soon" data-t="dueSoon">Due Soon</option>
              <option value="past-due" data-t="pastDue">Past Due</option>
              <option value="paid" data-t="paid">Paid</option>
            </select>
          </div>

          <div>
            <label data-t="category">Category</label>
            <select id="category">
              <option>Utilities</option>
              <option>Rent</option>
              <option>Credit Card</option>
              <option>Subscription</option>
              <option>Insurance</option>
              <option>Phone</option>
              <option>Internet</option>
              <option>Other</option>
            </select>
          </div>

          <div>
            <label data-t="assignedTo">Assigned To</label>
            <select id="assignedTo">
              <option>Me</option>
              <option>Mom</option>
              <option>Dad</option>
              <option>Brother</option>
              <option>Sister</option>
              <option>Shared Family</option>
            </select>
          </div>

          <div>
            <label data-t="paidBy">Paid By</label>
            <select id="paidBy">
              <option value="">Not paid yet</option>
              <option>Me</option>
              <option>Mom</option>
              <option>Dad</option>
              <option>Brother</option>
              <option>Sister</option>
              <option>Shared Family</option>
            </select>
          </div>

          <div>
            <label data-t="datePaid">Date Paid</label>
            <input id="datePaid" type="date" />
          </div>

          <div>
            <label data-t="paymentMethod">Payment Method</label>
            <input id="paymentMethod" placeholder="Bank, card, cash..." />
          </div>

          <div class="full">
            <label data-t="notes">Notes</label>
            <textarea id="notes" placeholder="Past due balance, late fee, reminder..."></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelBtn" data-t="cancel">Cancel</button>
          <button type="submit" class="primary" data-t="save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      doc,
      onSnapshot,
      getDocs,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB69IolGhMSpeg2FiavjUQTiSGhwsNnDqg",
      authDomain: "family-bill-tracker-f3338.firebaseapp.com",
      projectId: "family-bill-tracker-f3338",
      storageBucket: "family-bill-tracker-f3338.firebasestorage.app",
      messagingSenderId: "679336606423",
      appId: "1:679336606423:web:bce7938db1c1da30b30e92",
      measurementId: "G-BS7R3KS36F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const billsRef = collection(db, "bills");

    const translations = {
      en: {
        title: "Family Bill Tracker",
        addBill: "Add Bill",
        dark: "Dark",
        light: "Light",
        totalUnpaid: "Total Unpaid",
        pastDue: "Past Due",
        dueSoon: "Due Soon",
        paid: "Paid",
        all: "All",
        unpaid: "Unpaid",
        notDue: "Not Due Yet",
        billName: "Bill Name",
        provider: "Provider / Company",
        amount: "Amount Due",
        dueDate: "Due Date",
        status: "Status",
        category: "Category",
        assignedTo: "Assigned To",
        paidBy: "Paid By",
        datePaid: "Date Paid",
        paymentMethod: "Payment Method",
        notes: "Notes",
        cancel: "Cancel",
        save: "Save",
        edit: "Edit",
        delete: "Delete",
        markPaid: "Mark Paid",
        markUnpaid: "Mark Unpaid",
        noBills: "No bills yet. Add one to start.",
        connected: "✅ Connected to Firebase. Everyone with the link will see the same bills.",
        privacy: "Do not store bank numbers, card numbers, SSNs, or account numbers here. Use this only for bill name, amount, due date, and status.",
        confirmDelete: "Delete this bill?",
        paidByLabel: "Paid by",
        assignedLabel: "Assigned to",
        dueLabel: "Due",
        notesLabel: "Notes"
      },
      ar: {
        title: "متتبع فواتير العائلة",
        addBill: "إضافة فاتورة",
        dark: "داكن",
        light: "فاتح",
        totalUnpaid: "إجمالي غير المدفوع",
        pastDue: "متأخرة",
        dueSoon: "مستحقة قريبًا",
        paid: "مدفوعة",
        all: "الكل",
        unpaid: "غير مدفوعة",
        notDue: "ليست مستحقة بعد",
        billName: "اسم الفاتورة",
        provider: "الشركة",
        amount: "المبلغ المستحق",
        dueDate: "تاريخ الاستحقاق",
        status: "الحالة",
        category: "الفئة",
        assignedTo: "مخصصة لـ",
        paidBy: "دُفعت بواسطة",
        datePaid: "تاريخ الدفع",
        paymentMethod: "طريقة الدفع",
        notes: "ملاحظات",
        cancel: "إلغاء",
        save: "حفظ",
        edit: "تعديل",
        delete: "حذف",
        markPaid: "تحديد كمدفوعة",
        markUnpaid: "تحديد كغير مدفوعة",
        noBills: "لا توجد فواتير بعد. أضف فاتورة للبدء.",
        connected: "✅ متصل بفايربيس. كل شخص معه الرابط سيرى نفس الفواتير.",
        privacy: "لا تحفظ أرقام الحسابات البنكية أو البطاقات أو المعلومات الحساسة هنا. استخدمه فقط لاسم الفاتورة والمبلغ وتاريخ الاستحقاق والحالة.",
        confirmDelete: "هل تريد حذف هذه الفاتورة؟",
        paidByLabel: "دُفعت بواسطة",
        assignedLabel: "مخصصة لـ",
        dueLabel: "تاريخ الاستحقاق",
        notesLabel: "ملاحظات"
      }
    };

    const seedBills = [
      {
        name: "Washington Gas",
        provider: "Washington Gas",
        amount: 183.96,
        dueDate: "2026-04-28",
        status: "past-due",
        category: "Utilities",
        assignedTo: "Shared Family",
        paidBy: "",
        datePaid: "",
        paymentMethod: "",
        notes: "Previous balance $109.78 + current gas charges $43.60 + other charges $30.58. Includes late fee $0.80 and installment plan $29.78.",
        createdAt: serverTimestamp()
      },
      {
        name: "NOVEC Electricity",
        provider: "NOVEC",
        amount: 285.81,
        dueDate: "2026-05-22",
        status: "due-soon",
        category: "Utilities",
        assignedTo: "Shared Family",
        paidBy: "",
        datePaid: "",
        paymentMethod: "",
        notes: "Past due $136.76 + current $149.05 + late fee $1.99. Usage: 980 kWh.",
        createdAt: serverTimestamp()
      },
      {
        name: "Loudoun Water",
        provider: "Loudoun Water",
        amount: 119.80,
        dueDate: "2026-05-04",
        status: "past-due",
        category: "Utilities",
        assignedTo: "Shared Family",
        paidBy: "",
        datePaid: "",
        paymentMethod: "",
        notes: "Extra charges only. Actual balance may be higher. Late fees and collection charge shown.",
        createdAt: serverTimestamp()
      }
    ];

    let bills = [];
    let currentFilter = "all";
    let editingId = null;
    let currentLang = localStorage.getItem("billTrackerLang") || "en";
    let currentTheme = localStorage.getItem("billTrackerTheme") || "dark";

    const $ = (id) => document.getElementById(id);
    const tr = (key) => translations[currentLang][key] || translations.en[key] || key;
    const money = (num) => "$" + Number(num || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function todayISO() {
      return new Date().toISOString().split("T")[0];
    }

    function statusForBill(bill) {
      if (bill.status === "paid") return "paid";
      if (bill.status === "past-due") return "past-due";

      const today = new Date();
      today.setHours(0,0,0,0);
      const due = new Date(bill.dueDate + "T00:00:00");

      if (due < today) return "past-due";

      const days = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
      if (days <= 7) return "due-soon";

      return "not-due";
    }

    function statusLabel(status) {
      const map = {
        "paid": tr("paid"),
        "past-due": tr("pastDue"),
        "due-soon": tr("dueSoon"),
        "not-due": tr("notDue")
      };
      return map[status] || status;
    }

    function applyLanguage() {
      document.querySelectorAll("[data-t]").forEach(el => {
        const key = el.dataset.t;
        el.textContent = tr(key);
      });

      $("htmlRoot").lang = currentLang;
      $("htmlRoot").dir = currentLang === "ar" ? "rtl" : "ltr";
      $("langBtn").textContent = currentLang === "en" ? "عربي" : "English";
      $("connectionBox").textContent = tr("connected");
      document.title = tr("title");
      render();
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", currentTheme);
      const themeText = currentTheme === "dark" ? tr("light") : tr("dark");
      $("themeBtn").innerHTML = currentTheme === "dark" ? `☀️ <span>${themeText}</span>` : `🌙 <span>${themeText}</span>`;
    }

    function filteredBills() {
      return bills.filter(bill => {
        const s = statusForBill(bill);
        if (currentFilter === "all") return true;
        if (currentFilter === "unpaid") return s !== "paid";
        return s === currentFilter;
      });
    }

    function renderSummary() {
      let totalUnpaid = 0;
      let totalPastDue = 0;
      let totalDueSoon = 0;
      let totalPaid = 0;

      bills.forEach(bill => {
        const s = statusForBill(bill);
        const amount = Number(bill.amount || 0);

        if (s !== "paid") totalUnpaid += amount;
        if (s === "past-due") totalPastDue += amount;
        if (s === "due-soon") totalDueSoon += amount;
        if (s === "paid") totalPaid += amount;
      });

      $("totalUnpaid").textContent = money(totalUnpaid);
      $("totalPastDue").textContent = money(totalPastDue);
      $("totalDueSoon").textContent = money(totalDueSoon);
      $("totalPaid").textContent = money(totalPaid);
    }

    function render() {
      renderSummary();

      const list = $("billList");
      const data = filteredBills().sort((a, b) => {
        const order = { "past-due": 1, "due-soon": 2, "not-due": 3, "paid": 4 };
        return (order[statusForBill(a)] || 9) - (order[statusForBill(b)] || 9);
      });

      if (data.length === 0) {
        list.innerHTML = `<div class="empty">${tr("noBills")}</div>`;
        return;
      }

      list.innerHTML = data.map(bill => {
        const s = statusForBill(bill);
        return `
          <div class="bill ${s}">
            <div>
              <h3>${escapeHTML(bill.name || "")}</h3>
              <div class="meta">
                🏢 ${escapeHTML(bill.provider || "—")} ·
                📂 ${escapeHTML(bill.category || "—")} ·
                📅 ${tr("dueLabel")}: ${escapeHTML(bill.dueDate || "—")}
              </div>
              <div class="meta">
                👤 ${tr("assignedLabel")}: ${escapeHTML(bill.assignedTo || "—")}
                ${bill.paidBy ? ` · ✅ ${tr("paidByLabel")}: ${escapeHTML(bill.paidBy)}` : ""}
                ${bill.datePaid ? ` · ${escapeHTML(bill.datePaid)}` : ""}
              </div>
              ${bill.notes ? `<div class="notes">📝 ${tr("notesLabel")}: ${escapeHTML(bill.notes)}</div>` : ""}
              <span class="badge ${s}">${statusLabel(s)}</span>
            </div>

            <div>
              <div class="amount">${money(bill.amount)}</div>
              <div class="actions">
                <button class="small-btn paid-btn" onclick="togglePaid('${bill.id}')">
                  ${s === "paid" ? tr("markUnpaid") : tr("markPaid")}
                </button>
                <button class="small-btn" onclick="openEdit('${bill.id}')">${tr("edit")}</button>
                <button class="small-btn danger-btn" onclick="removeBill('${bill.id}')">${tr("delete")}</button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function openAdd() {
      editingId = null;
      $("modalTitle").textContent = tr("addBill");
      $("billForm").reset();
      $("dueDate").value = todayISO();
      $("status").value = "not-due";
      $("category").value = "Utilities";
      $("assignedTo").value = "Shared Family";
      $("modal").classList.add("open");
    }

    function openEdit(id) {
      const bill = bills.find(b => b.id === id);
      if (!bill) return;

      editingId = id;
      $("modalTitle").textContent = tr("edit");
      $("name").value = bill.name || "";
      $("provider").value = bill.provider || "";
      $("amount").value = bill.amount || "";
      $("dueDate").value = bill.dueDate || "";
      $("status").value = bill.status || "not-due";
      $("category").value = bill.category || "Utilities";
      $("assignedTo").value = bill.assignedTo || "Shared Family";
      $("paidBy").value = bill.paidBy || "";
      $("datePaid").value = bill.datePaid || "";
      $("paymentMethod").value = bill.paymentMethod || "";
      $("notes").value = bill.notes || "";
      $("modal").classList.add("open");
    }

    function closeModal() {
      $("modal").classList.remove("open");
      editingId = null;
    }

    async function saveBill(event) {
      event.preventDefault();

      const billData = {
        name: $("name").value.trim(),
        provider: $("provider").value.trim(),
        amount: Number($("amount").value),
        dueDate: $("dueDate").value,
        status: $("status").value,
        category: $("category").value,
        assignedTo: $("assignedTo").value,
        paidBy: $("paidBy").value,
        datePaid: $("datePaid").value,
        paymentMethod: $("paymentMethod").value.trim(),
        notes: $("notes").value.trim(),
        updatedAt: serverTimestamp()
      };

      if (!billData.name || !billData.dueDate || Number.isNaN(billData.amount)) {
        alert("Please fill out bill name, amount, and due date.");
        return;
      }

      try {
        if (editingId) {
          await updateDoc(doc(db, "bills", editingId), billData);
        } else {
          await addDoc(billsRef, { ...billData, createdAt: serverTimestamp() });
        }
        closeModal();
      } catch (error) {
        console.error(error);
        alert("Firebase save failed. Check Firestore rules and console errors.");
      }
    }

    async function togglePaid(id) {
      const bill = bills.find(b => b.id === id);
      if (!bill) return;

      const s = statusForBill(bill);
      const update = s === "paid"
        ? { status: "not-due", paidBy: "", datePaid: "", updatedAt: serverTimestamp() }
        : { status: "paid", paidBy: bill.paidBy || bill.assignedTo || "Me", datePaid: todayISO(), updatedAt: serverTimestamp() };

      try {
        await updateDoc(doc(db, "bills", id), update);
      } catch (error) {
        console.error(error);
        alert("Could not update bill. Check Firebase rules.");
      }
    }

    async function removeBill(id) {
      if (!confirm(tr("confirmDelete"))) return;

      try {
        await deleteDoc(doc(db, "bills", id));
      } catch (error) {
        console.error(error);
        alert("Could not delete bill. Check Firebase rules.");
      }
    }

    async function seedIfEmpty() {
      const snapshot = await getDocs(billsRef);
      if (snapshot.empty) {
        for (const bill of seedBills) {
          await addDoc(billsRef, bill);
        }
      }
    }

    function listenToBills() {
      onSnapshot(billsRef, (snapshot) => {
        bills = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        $("connectionBox").textContent = tr("connected");
        render();
      }, (error) => {
        console.error(error);
        $("connectionBox").textContent = "❌ Firebase error. Check Firestore rules.";
      });
    }

    $("addBtn").addEventListener("click", openAdd);
    $("closeBtn").addEventListener("click", closeModal);
    $("cancelBtn").addEventListener("click", closeModal);
    $("billForm").addEventListener("submit", saveBill);

    $("themeBtn").addEventListener("click", () => {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      localStorage.setItem("billTrackerTheme", currentTheme);
      applyTheme();
    });

    $("langBtn").addEventListener("click", () => {
      currentLang = currentLang === "en" ? "ar" : "en";
      localStorage.setItem("billTrackerLang", currentLang);
      applyLanguage();
      applyTheme();
    });

    document.querySelectorAll(".filter").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    $("modal").addEventListener("click", (e) => {
      if (e.target.id === "modal") closeModal();
    });

    window.openEdit = openEdit;
    window.togglePaid = togglePaid;
    window.removeBill = removeBill;

    applyLanguage();
    applyTheme();
    await seedIfEmpty();
    listenToBills();
  </script>
</body>
</html>
